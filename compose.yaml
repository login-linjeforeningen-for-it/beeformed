services:
    beeformed:
        container_name: beeformed
        image: beeformed
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        restart: always
        ports:
            - '8700:3000'
        env_file:
            - .env
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
            interval: 30s
            timeout: 5s
            start_period: 15s
            retries: 3
        mem_limit: 1g
        cpus: "2.0"

    beeformed_api:
        container_name: beeformed_api
        image: beeformed_api
        restart: always
        build:
            context: ./api
            dockerfile: Dockerfile
        ports:
            - '8701:8080'
        env_file:
            - .env
        depends_on:
            beeformed_database:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/ping || exit 1"]
            interval: 30s
            timeout: 5s
            start_period: 10s
            retries: 3
        mem_limit: 1g
        cpus: "2.0"

    beeformed_database:
        image: postgres:18-alpine
        container_name: beeformed_database
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER:-beeformed}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB:-beeformed}
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-beeformed} -d ${DB:-beeformed}"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s
        mem_limit: 1g
        cpus: "2.0"

volumes:
    postgres_data: